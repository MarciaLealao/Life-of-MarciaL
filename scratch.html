<!DOCTYPE html>
<html>
<head>
    <title>Marketing Scratch Page</title>
    <link rel="stylesheet" href="mystyles.css">
</head>
<body>
    <div class="main-container">
        <nav><a href="index.html">Back to Resume</a></nav>
        <h1>Marketing & Research Analysis</h1>
        
        <!-- Requirement: Nested List -->
        <ul>
            <li>Research Types
                <ol>
                    <li>Primary (Surveys)</li>
                    <li>Secondary (Reports)</li>
                </ol>
            </li>
        </ul>

        <!-- Requirement: Image (Direct link) -->
        <img src="https://unsplash.com" alt="Data" style="width:100%;">

        <!-- Requirement: YouTube (Standard Embed) -->
        <div style="margin:20px 0;">
            <iframe width="100%" height="315" src="https://youtube.com" frameborder="0" allowfullscreen></iframe>
        </div>

        <!-- Requirement: Tableau (Standard Embed) -->
        <div id="graph-anchor" style="height: 500px;">
            <script type="text/javascript" src="https://tableau.com"></script>
            <div class="tableauPlaceholder" style="width: 100%; height: 500px;">
                <object class="tableauViz" width="100%" height="500" style="display:none;">
                    <param name="host_url" value="https%3A%2F%2Fpublic.tableau.com%2F" />
                    <param name="name" value="RegionalSampleWorkbook/College" />
                    <param name="toolbar" value="yes" />
                </object>
            </div>
        </div>
        
        <p><a href="app.html">Play the AI Game</a></p>
    </div>
</body>
</html>
