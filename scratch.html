<!DOCTYPE html>
<html>
<head>
    <title>Marketing Scratch Page</title>
    <link rel="stylesheet" href="mystyles.css">
</head>
<body>
    <div class="main-container">
        <nav><a href="index.html">Back to Resume</a></nav>
        <h1>Marketing Deep Dive</h1>
        
        <!-- Requirement: Nested List -->
        <ul>
            <li>Research Types
                <ol>
                    <li>Primary</li>
                    <li>Secondary</li>
                </ol>
            </li>
        </ul>

        <!-- Requirement: Image (Using a direct link that works) -->
        <img src="https://unsplash.com" alt="Data" style="width:100%; border-radius:10px;">

        <!-- Requirement: YouTube (Basic Embed - No extra settings) -->
        <div style="margin: 20px 0;">
            <h3>Featured Video</h3>
            <iframe width="100%" height="315" src="https://youtube.com" frameborder="0" allowfullscreen></iframe>
        </div>

        <!-- Requirement: Tableau (The most basic script version) -->
        <div id="graph-anchor" style="margin-top: 20px;">
            <h3>Interactive Data</h3>
            <script type="text/javascript" src="https://tableau.com"></script>
            <div class="tableauPlaceholder" style="width: 100%; height: 500px;">
                <object class="tableauViz" width="100%" height="500" style="display:none;">
                    <param name="host_url" value="https%3A%2F%://tableau.com%2F" />
                    <param name="name" value="RegionalSampleWorkbook/College" />
                </object>
            </div>
        </div>
        
        <p><a href="app.html">Try the AI Game</a></p>
    </div>
</body>
</html>
