<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcia's Hobby Page</title>
    <style>
        body { background-color: #f4f7f6; font-family: 'Verdana', sans-serif; color: #333; margin: 0; padding: 0; }
        nav { background: #27ae60; padding: 20px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; }
        .main-container { max-width: 850px; margin: 40px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h1, h2 { color: #2e7d32; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        .media-block { background: #e8f5e9; padding: 20px; border-radius: 12px; margin: 30px 0; }
        .app-box { border: 2px dashed #27ae60; padding: 25px; border-radius: 15px; background: #fdfdfd; margin-top: 30px; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; margin: 5px; width: 180px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">← Back to Resume</a>
        <a href="#video">Video</a>
        <a href="#tableau">Data Viz</a>
        <a href="#app">Savings App</a>
    </nav>
    <div class="main-container">
        <h1>My Passion for a Great Deal!</h1>
        <p>I learned the rush of a good deal as a young mother through couponing.</p>
        
        <div class="media-block" id="video">
            <h2>Learn the Method</h2>
            <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
                <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" 
                        src="https://www.youtube.com/embed/Z57_pZ864H0" 
                        title="YouTube video" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div id="tableau" style="margin-top: 30px;">
            <h2>Consumer Spending Trends</h2>
            <iframe src="https://public.tableau.com/views/ConsumerSpending/Dashboard?:showVizHome=no&:embed=true" 
                    width="100%" height="500px" frameborder="0"></iframe>
        </div>

        <div class="app-box" id="app">
            <h2>Savings Goal Calculator</h2>
            <input type="number" id="weekly" placeholder="Weekly Savings ($)">
            <input type="number" id="goal" placeholder="Savings Goal ($)">
            <br><br>
            <button onclick="calc()">Calculate Goal</button>
            <p id="res" style="margin-top: 15px; font-weight: bold; color: #27ae60;"></p>
        </div>
    </div>
    <script>
        function calc() {
            const w = document.getElementById('weekly').value;
            const g = document.getElementById('goal').value;
            const r = document.getElementById('res');
            if(w > 0 && g > 0) {
                r.innerHTML = `It will take you about ${Math.ceil(g / w)} weeks to reach your goal!`;
            }
        }
    </script>
</body>
</html>
