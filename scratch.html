<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcia's Hobby Page</title>
    <style>
        body { background-color: #f4f7f6; font-family: 'Verdana', sans-serif; margin: 0; }
        nav { background: #27ae60; padding: 20px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; }
        .main-container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h1, h2 { color: #2e7d32; }
        .media-block { background: #e8f5e9; padding: 20px; border-radius: 12px; margin: 30px 0; }
        .app-box { border: 2px dashed #27ae60; padding: 20px; border-radius: 15px; margin-top: 30px; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        ol { display: inline-block; text-align: left; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">← Back to Resume</a>
        <a href="#video">Video</a>
        <a href="#tableau">Data Viz</a>
        <a href="#app">Savings App</a>
    </nav>
    <div class="main-container">
        <h1>Passion for Marketing & Deals</h1>
        <p>I mastered the art of "Stacking" and consumer research early on.</p>
        
        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=600" alt="Deals" style="width:100%; border-radius:10px;">

        <div class="media-block" id="video">
            <h2>The Power of Strategy</h2>
            <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
                <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" 
                        src="https://www.youtube.com/embed/Z57_pZ864H0" 
                        title="YouTube video" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div id="tableau">
            <h2>Consumer Spending Data</h2>
            <iframe src="https://public.tableau.com/views/ConsumerSpending/Dashboard?:showVizHome=no&:embed=true" 
                    width="100%" height="500px" frameborder="0"></iframe>
        </div>

        <div class="app-box" id="app">
            <h2>Savings Goal Calculator</h2>
            <input type="number" id="weekly" placeholder="Weekly Savings ($)" style="padding:8px;">
            <input type="number" id="goal" placeholder="Goal ($)" style="padding:8px;">
            <button onclick="calc()">Calculate</button>
            <p id="res" style="margin-top:10px; font-weight:bold; color:#27ae60;"></p>
        </div>
    </div>
    <script>
        function calc() {
            const w = document.getElementById('weekly').value;
            const g = document.getElementById('goal').value;
            const r = document.getElementById('res');
            if(w > 0 && g > 0) r.innerHTML = `You'll reach your goal in ${Math.ceil(g/w)} weeks!`;
        }
    </script>
</body>
</html>
