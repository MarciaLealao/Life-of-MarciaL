<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Number Guesser</title>
    <style>
        /* CSS styling included in the same page per requirements */
        body {
            background-color: #2e4053;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background: #34495e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        input {
            padding: 10px;
            font-size: 1.2rem;
            width: 80%;
            border-radius: 5px;
            border: none;
            margin: 20px 0;
        }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2ecc71; }
        #message { margin-top: 20px; font-weight: bold; min-height: 1.2em; }
        .back-link { margin-top: 30px; display: block; color: #bdc3c7; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Number Guesser</h1>
    <p>I'm thinking of a number between 1 and 100. Can you guess it?</p>
    
    <input type="number" id="userGuess" placeholder="Enter your guess">
    <br>
    <button onclick="checkGuess()">Submit Guess</button>
    
    <p id="message"></p>
    <p>Guesses so far: <span id="attempts">0</span></p>

    <a href="scratch.html" class="back-link">← Back to Scratch Page</a>
</div>

<script>
    // Game logic (JavaScript)
    const secretNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
        const guess = document.getElementById('userGuess').value;
        const message = document.getElementById('message');
        const attemptsDisplay = document.getElementById('attempts');
        
        if (!guess) return;

        attempts++;
        attemptsDisplay.innerHTML = attempts;

        if (guess == secretNumber) {
            message.innerHTML = "🎉 Correct! You got it in " + attempts + " tries!";
            message.style.color = "#2ecc71";
            document.querySelector('button').disabled = true;
        } else if (guess < secretNumber) {
            message.innerHTML = "Too low! Try a higher number.";
            message.style.color = "#e67e22";
        } else {
            message.innerHTML = "Too high! Try a lower number.";
            message.style.color = "#e74c3c";
        }
        document.getElementById('userGuess').value = '';
    }
</script>

</body>
</html>
